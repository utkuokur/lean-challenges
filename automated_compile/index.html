<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parametrized Lean Challenges</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "Computer Modern", "Latin Modern Roman", "Times New Roman", Times, serif;
      font-size: 16px;
      line-height: 1.65;
      color: #000;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: #000; }
    a:hover { text-decoration: underline; }
    code {
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      background: #f0f0f0;
      padding: 1px 4px;
    }

    /* ===== Header ===== */
    .header {
      border-bottom: 1px solid #000;
      padding: 16px clamp(24px, 5vw, 80px);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-title {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.02em;
    }
    .header-nav {
      display: flex;
      gap: 24px;
      list-style: none;
      font-size: 14px;
    }
    .header-nav a {
      color: #333;
    }
    .header-nav a:hover {
      color: #000;
    }

    /* ===== Main ===== */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px clamp(24px, 5vw, 80px) 80px;
    }

    /* ===== Hero / Intro ===== */
    .intro {
      margin-bottom: 64px;
    }
    .intro h1 {
      font-size: 28px;
      font-weight: normal;
      font-style: italic;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .intro p {
      font-size: 16px;
      color: #333;
      max-width: 640px;
    }

    /* ===== Section Headings ===== */
    h2 {
      font-size: 20px;
      font-weight: bold;
      margin: 48px 0 20px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ccc;
    }
    h3 {
      font-size: 16px;
      font-weight: bold;
      margin: 24px 0 12px;
    }

    /* ===== Problem List ===== */
    .problem-item {
      border: 1px solid #ccc;
      border-left: 3px solid #000;
      padding: 20px 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }
    .problem-item:hover {
      border-color: #000;
    }
    .problem-item.active {
      border-left: 3px solid #000;
      background: #fafafa;
    }
    .problem-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .problem-title {
      font-size: 16px;
      font-weight: bold;
    }
    .problem-meta-inline {
      font-size: 13px;
      color: #555;
      font-family: "Courier New", Courier, monospace;
    }
    .problem-desc {
      margin-top: 8px;
      font-size: 15px;
      color: #333;
      line-height: 1.6;
    }

    /* ===== Problem Detail ===== */
    .detail-panel {
      display: none;
      margin-top: -8px;
      margin-bottom: 32px;
      padding: 24px;
      border: 1px solid #000;
      border-top: none;
      background: #fafafa;
    }
    .detail-panel.active {
      display: block;
    }
    .detail-back {
      font-size: 13px;
      color: #555;
      cursor: pointer;
      margin-bottom: 16px;
      display: inline-block;
      font-family: "Courier New", Courier, monospace;
    }
    .detail-back:hover {
      text-decoration: underline;
      color: #000;
    }
    .detail-panel p {
      margin-bottom: 12px;
      font-size: 15px;
      color: #222;
    }
    .detail-panel p:last-child {
      margin-bottom: 0;
    }
    .info-box {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #ccc;
      background: #fff;
    }
    .info-box-label {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 8px;
      font-family: "Courier New", Courier, monospace;
    }
    .info-box p {
      font-size: 14px;
    }

    /* ===== Rules ===== */
    .rules-block {
      border: 1px solid #ccc;
      padding: 20px 24px;
      background: #fafafa;
      margin-top: 16px;
    }
    .code-block {
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 20px 24px;
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      margin-top: 16px;
    }
    .code-block .comment { color: #888; }
    .code-block .keyword { color: #fff; font-weight: bold; }
    .code-block .error-line {
      text-decoration: line-through;
      text-decoration-color: #ff4444;
      text-decoration-thickness: 2px;
      color: #ff6666;
    }
    .code-block .check { color: #66aa66; margin-left: 8px; }

    /* ===== Leaderboard ===== */
    .lb-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .lb-tab {
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .lb-tab:hover { border-color: #000; }
    .lb-tab.active {
      background: #000;
      color: #fff;
      border-color: #000;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 8px;
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #555;
      border-bottom: 2px solid #000;
      font-family: "Courier New", Courier, monospace;
    }
    tr:hover { background: #fafafa; }

    /* ===== Buttons ===== */
    .btn {
      display: inline-block;
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      padding: 10px 24px;
      border: 1px solid #000;
      background: #000;
      color: #fff;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover {
      background: #fff;
      color: #000;
      text-decoration: none;
    }
    .btn-secondary {
      background: #fff;
      color: #000;
    }
    .btn-secondary:hover {
      background: #000;
      color: #fff;
    }

    /* ===== Submission Form (inline, not modal) ===== */
    .submit-section {
      border: 1px solid #ccc;
      padding: 32px;
      background: #fafafa;
      margin-top: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-row.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .form-group label {
      display: block;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      color: #333;
    }
    .form-group label .optional {
      color: #888;
      text-transform: none;
      letter-spacing: 0;
      font-size: 11px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      background: #fff;
      font-family: "Times New Roman", Times, serif;
      font-size: 15px;
      color: #000;
      transition: border-color 0.2s ease;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #000;
    }

    /* ===== File Upload ===== */
    .file-upload-area {
      border: 2px dashed #ccc;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s ease;
      background: #fff;
    }
    .file-upload-area:hover {
      border-color: #000;
    }
    .file-upload-area.has-files {
      border-style: solid;
      border-color: #000;
      text-align: left;
      padding: 20px 24px;
    }
    .file-upload-input {
      display: none;
    }
    .file-upload-hint {
      font-size: 14px;
      color: #555;
      font-family: "Courier New", Courier, monospace;
    }
    .file-list {
      list-style: none;
      padding: 0;
    }
    .file-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
    }
    .file-list li:last-child {
      border-bottom: none;
    }
    .file-remove {
      color: #888;
      cursor: pointer;
      font-size: 12px;
      background: none;
      border: none;
      font-family: "Courier New", Courier, monospace;
    }
    .file-remove:hover {
      color: #000;
      text-decoration: underline;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    /* ===== Footer ===== */
    .footer {
      border-top: 1px solid #000;
      padding: 24px clamp(24px, 5vw, 80px);
      margin-top: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: #555;
    }

    /* ===== Result Area ===== */
    .result-area {
      margin-top: 32px;
      padding: 24px;
      border: 1px solid #000;
      background: #fafafa;
    }
    .result-area textarea {
      margin-top: 12px;
      margin-bottom: 12px;
    }
    .result-area .btn-secondary {
      margin-left: 0;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: flex-start; }
      .header-nav { gap: 16px; flex-wrap: wrap; }
      .form-row { grid-template-columns: 1fr; }
      .form-row.three-col { grid-template-columns: 1fr; }
      .form-actions { flex-direction: column; }
      .btn-secondary { margin-left: 0; margin-top: 8px; }
      th, td { padding: 8px 10px; font-size: 13px; }
      table { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
