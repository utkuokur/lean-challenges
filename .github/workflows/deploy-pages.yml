name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "automated_compile/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automated_compile
    steps:
      - uses: actions/checkout@v4

      # Enable GitHub Pages (source = GitHub Actions) from the workflow itself,
      # so a fresh repo doesn't 404 waiting for the Settings → Pages toggle.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automated_compile/package-lock.json

      - run: npm ci

      # Build only the static site (Vite). The backend is not deployed —
      # the leaderboard is read client-side from the submissions repo JSON.
      - run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: automated_compile/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
