name = "hadwiger-challenge"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Defs_and_Lems", "Challenges"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "Matroid"
git = "https://github.com/utkuokur/Matroid.git"
rev = "921afea59d5579726070550a5268b425e1042294"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0-rc2"

# Explicit globs: the root modules are empty/absent, so without these a bare
# `lake build` (and hence CI) would compile none of the challenge files.
# Each module is built separately; the challenge modules deliberately share
# root-level names (e.g. `def r`) and must never be co-imported.
[[lean_lib]]
name = "Defs_and_Lems"
globs = ["Defs_and_Lems.+"]

[[lean_lib]]
name = "Challenges"
globs = ["Challenges", "Challenges.+"]

